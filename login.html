<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – QuizApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .brand { color: white; font-size: 1.2rem; font-weight: bold; text-decoration: none; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            margin-left: 18px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: white; }

        .page-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .card-icon  { text-align: center; font-size: 2.8rem; margin-bottom: 8px; }
        .card-title { text-align: center; font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
        .card-sub   { text-align: center; font-size: 0.88rem; color: #888; margin: 6px 0 24px; }

        label {
            display: block;
            font-size: 0.83rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.93rem;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #7c3aed; }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-login:hover    { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 16px;
            display: none;
        }
        .msg.success { background: #dcfce7; color: #166534; display: block; }
        .msg.error   { background: #fee2e2; color: #991b1b; display: block; }

        .reg-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: #666;
        }
        .reg-link a { color: #7c3aed; font-weight: 600; text-decoration: none; }
        .reg-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="brand">🎓 QuizApp</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="quizzes.html">Quizzes</a>
        <a href="register.html">Register</a>
    </div>
</nav>

<div class="page-center">
    <div class="card">
        <div class="card-icon">🔐</div>
        <div class="card-title">Welcome Back! 👋</div>
        <div class="card-sub">Login to continue your quiz journey</div>

        <div id="msg" class="msg"></div>

        <label for="username">👤 Username</label>
        <input type="text"
               id="username"
               placeholder="Enter your username"
               onkeydown="if(event.key==='Enter') doLogin()">

        <label for="password">🔑 Password</label>
        <input type="password"
               id="password"
               placeholder="Enter your password"
               onkeydown="if(event.key==='Enter') doLogin()">

        <!-- ✅ onclick wired directly here -->
        <button class="btn-login" id="loginBtn" onclick="doLogin()">
            🔐 Login
        </button>

        <div class="reg-link">
            Don't have an account?
            <a href="register.html">Register here</a>
        </div>
    </div>
</div>

<script>
    // ── If already fully logged in, skip login page ──
    window.onload = function () {
        const uid  = localStorage.getItem('userId');
        const role = localStorage.getItem('role');
        const uname = localStorage.getItem('username');
        if (uid && role && uname) {
            window.location.href =
                role === 'ADMIN' ? 'admin.html' : 'quizzes.html';
        }
    };

    // ── Login ─────────────────────────────────────────
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn      = document.getElementById('loginBtn');
        const msgEl    = document.getElementById('msg');

        // clear old messages
        msgEl.className = 'msg';

        if (!username) { showMsg('⚠️ Please enter your username!', 'error'); return; }
        if (!password) { showMsg('⚠️ Please enter your password!', 'error'); return; }

        btn.disabled    = true;
        btn.textContent = '⏳ Logging in...';

        try {
            const res = await fetch('http://localhost:8080/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, password })
            });

            // ✅ Always parse JSON
            const data = await res.json();

            console.log('Login response:', res.status, data); // debug

            if (res.ok && data.id) {
                // ✅ SAVE to localStorage — this is the critical step
                localStorage.setItem('userId',   String(data.id));
                localStorage.setItem('username', data.username);
                localStorage.setItem('email',    data.email    || '');
                localStorage.setItem('role',     data.role);

                // Confirm saved
                console.log('Saved userId:', localStorage.getItem('userId'));
                console.log('Saved role:',   localStorage.getItem('role'));

                showMsg('✅ Login successful! Redirecting...', 'success');

                // ✅ Redirect after short delay
                setTimeout(function () {
                    if (data.role === 'ADMIN') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'quizzes.html';
                    }
                }, 800);

            } else {
                showMsg(data.error || '❌ Invalid username or password!', 'error');
            }

        } catch (e) {
            console.error('Login error:', e);
            showMsg('❌ Cannot reach server. Is backend running on port 8080?', 'error');
        } finally {
            btn.disabled    = false;
            btn.textContent = '🔐 Login';
        }
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className   = 'msg ' + type;
    }
</script>
</body>
</html>
