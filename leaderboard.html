<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Leaderboard 🏆 — QuizApp</title>
    <style>
        /* ── Reset ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            color: #1e293b;
        }

        /* ── NAVBAR ── */
        nav {
            background: #1e40af;
            padding: 0 32px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .nav-brand {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 0.92rem;
            transition: background 0.2s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.18);
            color: white;
        }
        #navLoggedOut { display: flex; gap: 6px; align-items: center; }
        #navLoggedIn  { display: none;  gap: 10px; align-items: center; }
        .nav-username { color: rgba(255,255,255,0.9); font-size: 0.9rem; }
        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: #dc2626; }

        /* ── PAGE LAYOUT ── */
        .container {
            max-width: 820px;
            margin: 40px auto;
            padding: 0 24px;
        }

        /* ── PAGE HEADING ── */
        .page-heading {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-heading h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e40af;
            margin-bottom: 8px;
        }
        .page-heading p {
            color: #64748b;
            font-size: 0.95rem;
        }

        /* ── QUIZ SELECTOR BAR ── */
        .selector-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            background: white;
            padding: 20px 24px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
        }
        .selector-bar select {
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            min-width: 220px;
            outline: none;
            color: #1e293b;
            font-family: inherit;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .selector-bar select:focus { border-color: #1e40af; }

        .btn-view {
            background: #1e40af;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-view:hover { background: #1d4ed8; transform: translateY(-1px); }

        .btn-back {
            background: #64748b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn-back:hover { background: #475569; }

        /* ── LEADERBOARD CARD ── */
        .lb-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* ── TABLE ── */
        .lb-card table {
            width: 100%;
            border-collapse: collapse;
        }
        .lb-card thead {
            background: linear-gradient(90deg, #1e40af, #7c3aed);
        }
        .lb-card thead th {
            padding: 16px 20px;
            text-align: left;
            font-size: 0.875rem;
            color: white;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .lb-card tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.15s;
        }
        .lb-card tbody tr:hover { background: #f8faff; }
        .lb-card tbody tr:last-child { border-bottom: none; }
        .lb-card td {
            padding: 14px 20px;
            font-size: 0.92rem;
            color: #334155;
        }

        /* ── RANK MEDALS ── */
        .rank-1 { color: #f59e0b; font-weight: 800; font-size: 1.1rem; }
        .rank-2 { color: #94a3b8; font-weight: 800; font-size: 1.05rem; }
        .rank-3 { color: #b45309; font-weight: 800; font-size: 1.05rem; }

        /* ── MY ROW HIGHLIGHT ── */
        .my-row { background: #eff6ff !important; }
        .my-row td:nth-child(2) {
            font-weight: 700;
            color: #1e40af;
        }
        .you-badge {
            background: #dbeafe;
            color: #1e40af;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }

        /* ── SCORE PILL ── */
        .score-pill {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.875rem;
            display: inline-block;
        }

        /* ── STATE MESSAGES ── */
        .state-msg {
            text-align: center;
            padding: 56px 20px;
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.7;
        }
        .state-msg .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
        }

        /* ── TOP 3 PODIUM BANNER ── */
        .podium-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 20px 16px;
            background: linear-gradient(135deg, #1e40af10, #7c3aed10);
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .podium-item {
            text-align: center;
            min-width: 90px;
        }
        .podium-medal { font-size: 2rem; display: block; }
        .podium-name  {
            font-size: 0.8rem;
            font-weight: 700;
            color: #1e293b;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90px;
        }
        .podium-score {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            nav { padding: 0 16px; }
            .container { padding: 0 16px; margin: 24px auto; }
            .page-heading h1 { font-size: 1.6rem; }
            .lb-card td, .lb-card th { padding: 10px 12px; }
            .selector-bar { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- ✅ Single consistent Navbar -->
<nav>
    <a class="nav-brand" href="index.html">🎓 QuizApp</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="quizzes.html">Quizzes</a>

        <!-- Shown when NOT logged in -->
        <div id="navLoggedOut">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>

        <!-- Shown when logged in -->
        <div id="navLoggedIn">
            <span class="nav-username" id="navUsername"></span>
            <button class="btn-logout" onclick="logout()">
                🚪 Logout
            </button>
        </div>
    </div>
</nav>

<!-- ── Main Content ── -->
<div class="container">

    <!-- Heading -->
    <div class="page-heading">
        <h1>🏆 Leaderboard</h1>
        <p>See how you rank against other players!</p>
    </div>

    <!-- Quiz Selector -->
    <div class="selector-bar">
        <select id="quizSelect">
            <option value="">-- Select a Quiz --</option>
        </select>
        <button class="btn-view" onclick="loadLeaderboard()">
            📊 View Rankings
        </button>
        <button class="btn-back"
                onclick="window.location.href='quizzes.html'">
            ← Back
        </button>
    </div>

    <!-- Leaderboard Card -->
    <div class="lb-card">
        <div id="lbBody">
            <div class="state-msg">
                <span class="icon">🎯</span>
                Select a quiz above and click
                <strong>"View Rankings"</strong>
                to see the leaderboard!
            </div>
        </div>
    </div>

</div>

<script>
    const BASE_URL = "https://quiz-app-backend-production-ffe2.up.railway.app/api";
    let currentUser = null;

    // ── ON LOAD ─────────────────────────────────────
    window.addEventListener("DOMContentLoaded", async () => {
        currentUser = JSON.parse(
            sessionStorage.getItem("loggedInUser")
        );

        // Update navbar
        if (currentUser) {
            document.getElementById("navLoggedOut")
                    .style.display = "none";
            document.getElementById("navLoggedIn")
                    .style.display = "flex";
            document.getElementById("navUsername")
                    .textContent = "👤 " + currentUser.username;
        }

        // Load quiz dropdown
        await loadQuizDropdown();

        // Auto-load if coming from quizzes page
        const savedId = sessionStorage.getItem("lastQuizId");
        if (savedId) {
            document.getElementById("quizSelect").value = savedId;
            await loadLeaderboard();
        }
    });

    // ── LOAD QUIZ DROPDOWN ───────────────────────────
    async function loadQuizDropdown() {
        try {
            const res    = await fetch(`${BASE_URL}/quiz/all`);
            const quizzes = await res.json();
            const sel    = document.getElementById("quizSelect");

            quizzes.forEach(q => {
                const opt      = document.createElement("option");
                opt.value      = q.id;
                opt.textContent = q.title;
                sel.appendChild(opt);
            });
        } catch (err) {
            console.error("Failed to load quiz list:", err);
        }
    }

    // ── LOAD LEADERBOARD DATA ────────────────────────
    async function loadLeaderboard() {
        const quizId = document.getElementById("quizSelect").value;

        if (!quizId) {
            alert("⚠️ Please select a quiz first!");
            return;
        }

        // Show loading state
        document.getElementById("lbBody").innerHTML = `
            <div class="state-msg">
                <span class="icon">⏳</span>
                Loading rankings...
            </div>`;

        try {
            const res  = await fetch(
                `${BASE_URL}/quiz/${quizId}/leaderboard`
            );
            const data = await res.json();

            if (!data || data.length === 0) {
                document.getElementById("lbBody").innerHTML = `
                    <div class="state-msg">
                        <span class="icon">😕</span>
                        No attempts yet!<br>
                        <strong>Be the first to play this quiz!</strong>
                    </div>`;
                return;
            }

            renderLeaderboard(data);

        } catch (err) {
            document.getElementById("lbBody").innerHTML = `
                <div class="state-msg">
                    <span class="icon">❌</span>
                    Failed to load leaderboard.<br>
                    Is the backend running?
                </div>`;
        }
    }

    // ── RENDER TABLE ─────────────────────────────────
    function renderLeaderboard(data) {
        const medals = ["🥇", "🥈", "🥉"];

        // ── Top 3 Podium Banner ──
        const top3 = data.slice(0, 3);
        const podiumHTML = `
            <div class="podium-bar">
                ${top3.map((e, i) => `
                    <div class="podium-item">
                        <span class="podium-medal">${medals[i]}</span>
                        <div class="podium-name">${e.username}</div>
                        <div class="podium-score">${e.score} pts</div>
                    </div>
                `).join("")}
            </div>`;

        // ── Table Rows ──
        const rows = data.map((entry, i) => {
            const isMe = currentUser &&
                entry.username === currentUser.username;

            const rankCell = i < 3
                ? `<span class="rank-${i+1}">
                       ${medals[i]}
                   </span>`
                : `<span style="color:#64748b;font-weight:600;">
                       #${entry.rank}
                   </span>`;

            const date = entry.submittedAt
                ? new Date(entry.submittedAt).toLocaleDateString(
                    'en-IN', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    })
                : "—";

            return `
                <tr class="${isMe ? 'my-row' : ''}">
                    <td>${rankCell}</td>
                    <td>
                        ${entry.username}
                        ${isMe
                            ? '<span class="you-badge">You</span>'
                            : ''}
                    </td>
                    <td>
                        <span class="score-pill">
                            ${entry.score} pts
                        </span>
                    </td>
                    <td>${date}</td>
                </tr>`;
        }).join("");

        document.getElementById("lbBody").innerHTML = `
            ${podiumHTML}
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Score</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    // ── LOGOUT ───────────────────────────────────────
    function logout() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
